<!DOCTYPE html>
<html lang="en" style="height:100%">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, initial-scale=1.0" />
    <title>Kepler TV App</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1a1a2e;
      }
      #root {
        display: flex;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- tizen-studio-fallback:start -->
    <script>
      (function () {
        function openBuiltApp() {
          window.location.replace('./dist/index.html');
        }

        var isPackagedRuntime =
          window.location.protocol === 'file:' ||
          window.location.protocol === 'widget:';

        if (isPackagedRuntime) {
          openBuiltApp();
          return;
        }

        window.setTimeout(function () {
          if (!window.__KEPLER_APP_BOOTED__) {
            openBuiltApp();
          }
        }, 1500);
      })();
    </script>
    <!-- tizen-studio-fallback:end -->
  </body>
</html>
