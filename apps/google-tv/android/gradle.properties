# Project-wide Gradle settings.
android.useAndroidX=true
android.enableJetifier=true
FLIPPER_VERSION=0.182.0
hermesEnabled=true
newArchEnabled=false
jscFlavor=org.webkit:android-jsc:+

# Increase JVM memory for processing large AARs (react-android ~50MB)
org.gradle.jvmargs=-Xmx4g -Xss4m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError
